<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelos Cambio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <!-- Tailwind CSS para el diseño rápido y ligero -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between p-4 max-w-md mx-auto">

    <!-- Header -->
    <header class="flex justify-between items-center py-4 border-b border-zinc-800">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse" id="online-indicator"></div>
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">AETHELOS <span class="text-white text-sm font-light">CAMBIO</span></h1>
        </div>
        <span id="offline-badge" class="hidden text-xs bg-red-900/50 text-red-400 px-2 py-1 rounded border border-red-800">Offline</span>
    </header>

    <!-- Main Converter -->
    <main class="flex-grow flex flex-col justify-center gap-6 my-6">
        <!-- Input Block -->
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 shadow-xl">
            <label class="text-xs text-zinc-400 block mb-1">Tú tienes</label>
            <div class="flex gap-2">
                <input type="number" id="amount-input" value="100" class="w-full bg-transparent text-3xl font-semibold outline-none text-white [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <select id="from-currency" class="bg-zinc-800 text-white font-bold px-3 py-1 rounded-xl border border-zinc-700 outline-none">
                    <option value="USD">USD</option>
                    <option value="USDT">USDT</option>
                    <option value="BS">Bs</option>
                    <option value="COP">COP</option>
                    <option value="BTC">BTC</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>

        <!-- Swap Button -->
        <div class="flex justify-center -my-3 z-10">
            <button id="swap-btn" class="bg-emerald-500 hover:bg-emerald-600 text-zinc-950 p-3 rounded-full shadow-lg transition-transform active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
                </svg>
            </button>
        </div>

        <!-- Output Block -->
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 shadow-xl">
            <label class="text-xs text-zinc-400 block mb-1">Tú recibes (Tasa Real + Comisión)</label>
            <div class="flex gap-2">
                <div id="result-output" class="w-full text-3xl font-semibold text-emerald-400 py-1">0.00</div>
                <select id="to-currency" class="bg-zinc-800 text-white font-bold px-3 py-1 rounded-xl border border-zinc-700 outline-none">
                    <option value="BS" selected>Bs</option>
                    <option value="USD">USD</option>
                    <option value="USDT">USDT</option>
                    <option value="COP">COP</option>
                    <option value="BTC">BTC</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>

        <!-- Meta Info (Tasas y Comisión) -->
        <div class="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800/80 text-xs text-zinc-400 flex flex-col gap-1.5">
            <div class="flex justify-between">
                <span>Tasa Base Interbancaria:</span>
                <span id="base-rate-text" class="text-zinc-200 font-mono">--</span>
            </div>
            <div class="flex justify-between">
                <span>Comisión Operativa integrada:</span>
                <span id="commission-text" class="text-zinc-200 font-mono">--</span>
            </div>
            <div class="flex justify-between">
                <span>Última actualización:</span>
                <span id="last-update" class="text-zinc-400 italic">Cargando...</span>
            </div>
        </div>
    </main>

    <!-- Footer / Historial Rápido -->
    <footer class="border-t border-zinc-800 pt-4">
        <h3 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Últimas Conversiones</h3>
        <div id="history-container" class="flex flex-col gap-2 max-h-32 overflow-y-auto pr-1">
            <!-- Inyectado por JS -->
            <p class="text-xs text-zinc-600 italic">El historial aparecerá aquí.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
