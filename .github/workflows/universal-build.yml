name: Build Universal Aethelos (Selección de Proyecto)

on:
  workflow_dispatch:
    inputs:
      project_folder:
        description: 'Carpeta exacta del proyecto (ej: aethelos-cambio)'
        required: true
        default: 'aethelos-cambio'
      app_name:
        description: 'Nombre visual de la App (ej: Aethelos Cambio)'
        required: true
        default: 'Aethelos Cambio'
      app_id:
        description: 'ID de Android SIN GUIONES (ej: com.aethelos.cambio)'
        required: true
        default: 'com.aethelos.cambio'

jobs:
  build:
    name: Compilar APK Profesional
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Configurar Java para Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 🛠️ Construir Entorno e Inyectar Código Puro
        run: |
          # 1. Detectar la carpeta real
          TARGET_FOLDER=$(find . -maxdepth 1 -iname "${{ github.event.inputs.project_folder }}" -type d | head -n 1 | sed 's|^\./||')
          
          if [ -z "$TARGET_FOLDER" ]; then
            echo "❌ ERROR: No se encontró la carpeta '${{ github.event.inputs.project_folder }}' en tu repositorio."
            exit 1
          fi
          
          # 2. Verificar el index.html
          INDEX_FILE=$(find "$TARGET_FOLDER" -maxdepth 1 -iname "index.html" -type f | head -n 1)
          if [ -z "$INDEX_FILE" ]; then
            echo "❌ ERROR: No hay ningún archivo index.html dentro de la carpeta '$TARGET_FOLDER'."
            exit 1
          fi
          
          if [ "$INDEX_FILE" != "$TARGET_FOLDER/index.html" ]; then
            mv "$INDEX_FILE" "$TARGET_FOLDER/index.html"
          fi

          # 3. Inicializar Capacitor
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.app_id }}" --web-dir="$TARGET_FOLDER"
          npx cap add android
          chmod +x android/gradlew
          npx cap sync android

          # 4. PARCHE ANTI-BUCLE: Forzar una única versión de Kotlin para evitar duplicados
          cat << 'EOF' >> android/build.gradle

          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.22'
                      }
                  }
              }
          }
          EOF

      - name: 🚀 Compilar APK con Gradle
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🏷️ Renombrar APK a Nombre de Confianza
        run: |
          CLEAN_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/ /-/g')
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/$CLEAN_NAME.apk
          echo "APK_FILENAME=$CLEAN_NAME" >> $GITHUB_ENV

      - name: 📤 Exportar ZIP con tu APK Listo
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}-Instalador
          path: android/app/build/outputs/apk/debug/${{ env.APK_FILENAME }}.apk
