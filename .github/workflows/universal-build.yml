name: Build Universal Aethelos (Selección de Proyecto)

on:
  workflow_dispatch:
    inputs:
      project_folder:
        description: 'Carpeta exacta del proyecto (ej: aethelos-cambio)'
        required: true
        default: 'aethelos-cambio'
      app_name:
        description: 'Nombre visual de la App (ej: Aethelos Cambio)'
        required: true
        default: 'Aethelos Cambio'
      app_id:
        description: 'ID de Android SIN GUIONES (ej: com.aethelos.cambio)'
        required: true
        default: 'com.aethelos.cambio'

jobs:
  build:
    name: Compilar APK Profesional
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Configurar Java para Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Construir Entorno e Inyectar Código Puro
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.app_id }}" --web-dir="${{ github.event.inputs.project_folder }}"
          npx cap add android
          chmod +x android/gradlew
          npx cap sync android

      - name: 🚀 Compilar APK con Gradle
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🏷️ Renombrar APK a Nombre de Confianza
        run: |
          # Convierte el nombre (ej: "Aethelos Cambio" pasa a ser "Aethelos-Cambio")
          CLEAN_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/ /-/g')
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/$CLEAN_NAME.apk
          echo "APK_FILENAME=$CLEAN_NAME" >> $GITHUB_ENV

      - name: 📤 Exportar ZIP con tu APK Listo
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}-Instalador
          path: android/app/build/outputs/apk/debug/${{ env.APK_FILENAME }}.apk
