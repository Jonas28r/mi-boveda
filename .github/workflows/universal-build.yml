name: Build Universal Aethelos (Selección de Proyecto)

on:
  # Esto activa el formulario manual en la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      project_folder:
        description: 'Nombre de la carpeta a compilar (ej: aethelos-cambio)'
        required: true
        default: 'aethelos-cambio'
      app_name:
        description: 'Nombre real de la App'
        required: true
        default: 'Aethelos Cambio'

jobs:
  build:
    name: Compilar APK Ligera
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js (Sin Caché Estricto)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Eliminado por completo el 'cache: npm' para evitar el error de la captura

      - name: ☕ Configurar Java para Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Armar Estructura de la App en Caliente
        run: |
          # 1. Crear entorno mínimo de ejecución en el aire
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 2. Inicializar Capacitor apuntando ÚNICAMENTE a la carpeta elegida
          npx cap init "${{ github.event.inputs.app_name }}" "com.aethelos.${{ github.event.inputs.project_folder }}" --web-dir=${{ github.event.inputs.project_folder }}
          
          # 3. Crear el proyecto contenedor de Android
          npx cap add android
          npx cap sync android

      - name: 🚀 Compilar con Gradle
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🏷️ Renombrar APK al Nombre del Proyecto
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/${{ github.event.inputs.project_folder }}.apk

      - name: 📤 Exportar ZIP con el APK Limpio
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_folder }}-APK-Descarga
          path: android/app/build/outputs/apk/debug/${{ github.event.inputs.project_folder }}.apk
