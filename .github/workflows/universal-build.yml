name: Build Universal Aethelos (Selección de Proyecto)

on:
  # Esto activa el formulario manual en la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      project_folder:
        description: 'Carpeta del proyecto a compilar (ej: aethelos-cambio)'
        required: true
        default: 'aethelos-cambio'
      app_name:
        description: 'Nombre de la App (ej: Aethelos Cambio)'
        required: true
        default: 'Aethelos Cambio'
      app_id:
        description: 'ID de la App (ej: com.aethelos.cambio)'
        required: true
        default: 'com.aethelos.cambio'

jobs:
  build-ligero:
    name: Build Pure Web & Lightweight APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses:4 actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Configurar Java para Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Inicializar Entorno de la App Seleccionada
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Creamos la carpeta de destino web
          mkdir -p aethelos_web
          
          # Copiamos ÚNICAMENTE el contenido de la carpeta que elegiste en el formulario
          cp -r ${{ github.event.inputs.project_folder }}/. aethelos_web/
          
          # Inicializamos usando las variables dinámicas que ingresaste
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.app_id }}" --web-dir=aethelos_web
          npx cap add android
          npx cap sync android

      - name: 🚀 Compilar APK Ligera (Gradle)
        working-directory: ./android
        run: ./gradlew assembleDebug

      # El bot ahora renombra el APK usando el nombre dinámico que le diste
      - name: 🏷️ Renombrar APK dinámicamente
        run: |
          SAFE_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '-')
          mv android/app/build/outputs/apk/debug/Aethelos-Cambio.apk android/app/build/outputs/apk/debug/$SAFE_NAME.apk
          echo "FINAL_APK_NAME=$SAFE_NAME" >> $GITHUB_ENV

      # El archivo .ZIP final llevará el nombre de la app elegida
      - name: 📤 Exportar APK Lista para Instalar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Descarga
          path: android/app/build/outputs/apk/debug/${{ env.FINAL_APK_NAME }}.apk
